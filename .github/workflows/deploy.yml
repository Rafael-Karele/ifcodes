name: Deploy

on:
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      jam: ${{ steps.filter.outputs.jam }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'back/**'
            frontend:
              - 'front/**'
            jam:
              - 'jam-server/**'

  tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/phpunit.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [changes, tests]
    if: always() && (needs.tests.result == 'success' || needs.tests.result == 'skipped')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            git pull origin main

            SERVICES=""

            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              SERVICES="$SERVICES backend_app queue_worker"
            fi

            if [ "${{ needs.changes.outputs.frontend }}" = "true" ]; then
              SERVICES="$SERVICES frontend_app"
            fi

            if [ "${{ needs.changes.outputs.jam }}" = "true" ]; then
              SERVICES="$SERVICES jam_server"
            fi

            if [ -n "$SERVICES" ]; then
              docker compose up -d --build $SERVICES
            fi

            if [ "${{ needs.changes.outputs.backend }}" = "true" ]; then
              docker exec laravel_app php artisan migrate --force
              docker exec laravel_app php artisan config:cache
            fi
