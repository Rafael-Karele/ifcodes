name: Deploy

on:
  push:
    branches: [main]

jobs:
  tests:
    name: Tests
    uses: ./.github/workflows/phpunit.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [tests]
    if: always() && (needs.tests.result == 'success' || needs.tests.result == 'skipped')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            # Record current HEAD before pulling
            BEFORE=$(git rev-parse HEAD)

            git stash --include-untracked || true
            git pull origin main
            git stash pop || true

            # Ensure judge0.conf exists (it is gitignored, only judge0.conf.example is tracked)
            if [ ! -f judge0.conf ]; then
              echo "WARNING: judge0.conf not found, copying from example. Update passwords before use!"
              cp judge0.conf.example judge0.conf
            fi

            AFTER=$(git rev-parse HEAD)

            # Detect what actually changed on the VPS (covers failed deploys too)
            CHANGED=$(git diff --name-only "$BEFORE" "$AFTER")

            SERVICES=""

            if echo "$CHANGED" | grep -q '^back/'; then
              SERVICES="$SERVICES backend_app queue_worker"
            fi

            if echo "$CHANGED" | grep -q '^front/'; then
              SERVICES="$SERVICES frontend_app"
            fi

            if echo "$CHANGED" | grep -q '^ws-server/'; then
              SERVICES="$SERVICES ws_server"
            fi

            if echo "$CHANGED" | grep -q '^docker-compose.yml'; then
              SERVICES="backend_app queue_worker frontend_app ws_server"
            fi

            if [ -n "$SERVICES" ]; then
              echo "Rebuilding: $SERVICES"
              docker compose up -d --build $SERVICES
            else
              echo "No service changes detected"
            fi

            if echo "$CHANGED" | grep -q '^back/'; then
              docker exec laravel_app php artisan migrate --force
              docker exec laravel_app php artisan config:cache
            fi
